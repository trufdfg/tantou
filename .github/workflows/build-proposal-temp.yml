name: Temporary proposal builder

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout artifact branch
        uses: actions/checkout@v4
        with:
          ref: chatgpt-proposal-artifact

      - name: Verify generated Word file
        run: test -f artifacts/master_proposal_with_figures.docx

      - name: Upload Word artifact
        uses: actions/upload-artifact@v4
        with:
          name: master-proposal-word
          path: artifacts/master_proposal_with_figures.docx
          if-no-files-found: error
