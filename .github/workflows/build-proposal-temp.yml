name: Temporary proposal builder

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/build-proposal-temp.yml
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout artifact branch
        uses: actions/checkout@v4
        with:
          ref: chatgpt-proposal-artifact

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install python-docx pillow

      - name: Patch font XML helper
        run: sed -i 's/\.rFonts\.set(/.get_or_add_rFonts().set(/g' tools/build_master_proposal.py

      - name: Build Word document and capture diagnostics
        run: |
          set +e
          python tools/build_master_proposal.py > build-proposal.log 2>&1
          code=$?
          echo "exit_code=$code" >> build-proposal.log
          if [ $code -eq 0 ]; then
            cp artifacts/*.docx artifacts/master_proposal_with_figures.docx
          fi
          exit 0

      - name: Commit artifact or diagnostics to temporary branch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add artifacts build-proposal.log || true
          git commit -m "Build proposal Word artifact and diagnostics" || exit 0
          git push origin HEAD:chatgpt-proposal-artifact
